<!DOCTYPE html>
<html lang="en">
<!--
  Ralph VC — installable PWA edition.
  Add to Home Screen from Safari → behaves like an app icon. Uses the Web
  Speech API for STT/TTS, talks to the same /v1/orchestrate endpoint as
  the native app.

  Authored by Chase Eddies <source@distillative.ai>.
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ralph VC">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<title>Ralph VC</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #f0f0f0;
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: contain;
  }
  body {
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #1f1f1f;
  }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; }
  header button {
    background: none; border: none; color: #9aa0a6; font-size: 22px; padding: 4px 8px;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .msg { padding: 10px 12px; border-radius: 12px; margin: 6px 0; max-width: 86%; word-wrap: break-word; }
  .msg.user { background: #1a3a6f; align-self: flex-end; margin-left: auto; }
  .msg.assistant { background: #1f1f1f; }
  .msg.error { background: #5a1a1a; color: #ffd0d0; }
  .row { display: flex; flex-direction: column; }
  #composer {
    display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #1f1f1f;
  }
  #mic, #send {
    border: none; border-radius: 22px; height: 44px; min-width: 44px; font-size: 16px;
  }
  #mic { background: #1f1f1f; color: #f0f0f0; padding: 0 14px; }
  #mic.on { background: #c0392b; color: #fff; }
  #draft {
    flex: 1; background: #1f1f1f; color: #f0f0f0; border: none; border-radius: 22px;
    padding: 12px 16px; font-size: 16px; min-width: 0;
  }
  #send { background: #2962ff; color: #fff; padding: 0 16px; font-weight: 600; }
  #send:disabled { opacity: 0.5; }
  #settings {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  #settings.open { display: flex; }
  #settings .panel {
    background: #1a1a1a; border-radius: 14px; padding: 16px; max-width: 420px; width: 100%;
  }
  #settings label { display: block; font-size: 13px; color: #9aa0a6; margin: 8px 0 4px; }
  #settings input {
    width: 100%; background: #0a0a0a; color: #f0f0f0; border: 1px solid #333; border-radius: 8px;
    padding: 10px 12px; font-size: 16px;
  }
  #settings .actions { display: flex; gap: 8px; margin-top: 12px; }
  #settings button {
    flex: 1; height: 44px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
  }
  #settings .save { background: #2962ff; color: #fff; }
  #settings .close { background: #1f1f1f; color: #f0f0f0; }
  .thinking { color: #9aa0a6; font-style: italic; padding: 6px 12px; }
</style>
</head>
<body>
  <header>
    <h1>Ralph VC</h1>
    <button id="open-settings" aria-label="Settings">⚙︎</button>
  </header>
  <div id="log" class="row" aria-live="polite"></div>
  <div id="composer">
    <button id="mic" aria-label="Toggle voice input">🎤</button>
    <input id="draft" type="text" placeholder="Ask Ralph…" autocomplete="off"
           autocapitalize="sentences" enterkeyhint="send">
    <button id="send">Send</button>
  </div>

  <div id="settings" role="dialog" aria-modal="true">
    <div class="panel">
      <h2 style="margin-top:0;font-size:17px">Settings</h2>
      <label for="ep">Mac orchestrator endpoint</label>
      <input id="ep" type="url" placeholder="http://192.168.1.42:7878"
             autocomplete="off" autocapitalize="off">
      <label for="tk">Bearer token</label>
      <input id="tk" type="password" placeholder="Paste from setup.sh"
             autocomplete="off" autocapitalize="off">
      <div class="actions">
        <button class="close" type="button">Cancel</button>
        <button class="save"  type="button">Save</button>
      </div>
      <p style="font-size:12px;color:#9aa0a6;margin-top:10px">
        Stored locally in this browser. Open Safari's Share sheet → <em>Add to Home Screen</em>
        to install Ralph VC as an app.
      </p>
    </div>
  </div>

<script>
(() => {
  const log    = document.getElementById('log');
  const draft  = document.getElementById('draft');
  const mic    = document.getElementById('mic');
  const send   = document.getElementById('send');
  const sheet  = document.getElementById('settings');
  const epIn   = document.getElementById('ep');
  const tkIn   = document.getElementById('tk');

  // ---- settings ----
  const SETTINGS_KEY = 'ralphvc.settings.v1';
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
    catch { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
  let settings = loadSettings();
  if (!settings.endpoint) settings.endpoint = location.origin;

  document.getElementById('open-settings').onclick = () => {
    epIn.value = settings.endpoint || '';
    tkIn.value = settings.bearer   || '';
    sheet.classList.add('open');
  };
  sheet.querySelector('.close').onclick = () => sheet.classList.remove('open');
  sheet.querySelector('.save').onclick  = () => {
    settings = {
      endpoint: epIn.value.trim().replace(/\/$/, ''),
      bearer:   tkIn.value.trim(),
    };
    saveSettings(settings);
    sheet.classList.remove('open');
  };

  // ---- chat ----
  function append(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  let thinkingNode = null;
  function setThinking(on) {
    if (on && !thinkingNode) {
      thinkingNode = document.createElement('div');
      thinkingNode.className = 'thinking';
      thinkingNode.textContent = 'Ralph is thinking…';
      log.appendChild(thinkingNode);
      log.scrollTop = log.scrollHeight;
    } else if (!on && thinkingNode) {
      thinkingNode.remove();
      thinkingNode = null;
    }
  }

  async function ask(prompt) {
    if (!settings.bearer) {
      append('error', 'Set a bearer token in Settings first.');
      return;
    }
    append('user', prompt);
    setThinking(true);
    send.disabled = true;
    try {
      const res = await fetch(settings.endpoint + '/v1/orchestrate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + settings.bearer,
        },
        body: JSON.stringify({ prompt, max_turns: 6 }),
      });
      if (!res.ok) {
        const body = await res.text();
        append('error', `HTTP ${res.status}: ${body.slice(0, 200)}`);
        return;
      }
      const data = await res.json();
      const reply = data.final_text || '(empty reply)';
      append('assistant', reply);
      speak(reply);
    } catch (e) {
      append('error', `Couldn't reach the orchestrator: ${e.message}`);
    } finally {
      setThinking(false);
      send.disabled = false;
    }
  }

  send.onclick = () => {
    const p = draft.value.trim();
    if (!p) return;
    draft.value = '';
    ask(p);
  };
  draft.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); send.click(); }
  });

  // ---- TTS (Web Speech API; prefers Ralph voice when installed) ----
  function preferredVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    return voices.find(v => /Ralph/i.test(v.name) || /Ralph/i.test(v.voiceURI))
        || voices.filter(v => v.lang.startsWith('en'))
                 .sort((a,b) => (b.localService - a.localService))[0]
        || voices[0];
  }
  speechSynthesis.onvoiceschanged = () => {}; // trigger voice list load on iOS
  function speak(text) {
    try {
      const u = new SpeechSynthesisUtterance(text);
      const v = preferredVoice();
      if (v) u.voice = v;
      u.rate = 1.0;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    } catch (_) { /* TTS not available — silent fallback */ }
  }

  // ---- STT (webkitSpeechRecognition where supported) ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null;
  if (SR) {
    rec = new SR();
    rec.continuous = false;
    rec.interimResults = true;
    rec.lang = 'en-US';
    rec.onresult = (e) => {
      const last = e.results[e.results.length - 1];
      draft.value = last[0].transcript;
      if (last.isFinal) {
        send.click();
        mic.classList.remove('on');
      }
    };
    rec.onerror = () => mic.classList.remove('on');
    rec.onend = () => mic.classList.remove('on');
  } else {
    mic.title = 'Speech recognition not supported in this browser';
  }
  mic.onclick = () => {
    if (!rec) return;
    if (mic.classList.contains('on')) {
      rec.stop();
      mic.classList.remove('on');
    } else {
      try { rec.start(); mic.classList.add('on'); } catch (_) {}
    }
  };

  // ---- service worker for offline shell ----
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
